<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | FreshHarvest</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Fresh<span>Harvest</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Shop</a></li>
      <li><a href="farmer.html">Sell Produce</a></li>
    </ul>
    <div class="cart-icon">
      <a href="cart.html" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        <span id="cart-count">0</span>
      </a>
    </div>
  </nav>

  <main class="container cart-container">
    <h2>Shopping Cart</h2>
    <div class="cart-layout">
      <div class="cart-items" id="cart-items-container">
        <!-- Cart items injected via JS -->
      </div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="cart-subtotal">₹0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax (8%)</span>
          <span id="cart-tax">₹0.00</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="cart-total">₹0.00</span>
        </div>
        <a href="checkout.html" id="checkout-btn" class="btn btn-primary btn-block" style="text-align: center; display: block;">Proceed to Checkout</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 FreshHarvest Marketplace. Supporting Local Farmers.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
