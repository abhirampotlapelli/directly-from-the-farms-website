<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment | FreshHarvest</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Fresh<span>Harvest</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Shop</a></li>
      <li><a href="farmer.html">Sell Produce</a></li>
    </ul>
    <div class="cart-icon">
      <a href="cart.html" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        <span id="cart-count">0</span>
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="form-wrapper" style="max-width: 800px;">
      <h2>Secure Checkout</h2>
      <p>Complete your payment to place the order.</p>

      <div class="checkout-layout">
        <!-- Order Summary Side -->
        <div class="checkout-summary" id="checkout-summary-container">
            <h3>Order Total</h3>
            <div class="summary-row total">
                <span>Total to Pay</span>
                <span id="checkout-total">₹0.00</span>
            </div>
            <a href="cart.html" class="btn btn-danger" style="display:inline-block; font-size:0.9rem;">Return to Cart</a>
        </div>
        
        <!-- Payment Details Form -->
        <div class="checkout-form">
            <form id="payment-form">
              <h3>Shipping Details</h3>
              <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required placeholder="Sanjay Kumar">
              </div>
              <div class="form-group">
                <label for="address">Delivery Address</label>
                <input type="text" id="address" required placeholder="123 Farm Lane, Apt 4B">
              </div>

              <h3 style="margin-top: 2rem;">Payment Method</h3>
              <div class="form-group">
                <label for="paymentType">Select Payment Type</label>
                <select id="paymentType" required onchange="togglePaymentFields()">
                  <option value="upi">UPI / PhonePe / GPay</option>
                  <option value="card">Credit / Debit Card</option>
                  <option value="cod">Cash on Delivery</option>
                </select>
              </div>

              <!-- Dynamic Payment Fields -->
              <div id="upi-fields" class="payment-fields">
                  <div class="form-group">
                    <label for="upiId">UPI ID</label>
                    <input type="text" id="upiId" placeholder="example@upi">
                  </div>
              </div>

              <div id="card-fields" class="payment-fields hidden">
                  <div class="form-group">
                    <label for="cardNumber">Card Number</label>
                    <input type="text" id="cardNumber" placeholder="XXXX-XXXX-XXXX-XXXX">
                  </div>
                  <div class="form-row">
                      <div class="form-group">
                          <label for="expiry">Expiry</label>
                          <input type="text" id="expiry" placeholder="MM/YY">
                      </div>
                      <div class="form-group">
                          <label for="cvv">CVV</label>
                          <input type="text" id="cvv" placeholder="123">
                      </div>
                  </div>
              </div>

              <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Complete Payment</button>
            </form>
            <div id="checkout-success" class="hidden alert alert-success">Payment successful! Your fresh produce is on its way.</div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 FreshHarvest Marketplace. Supporting Local Farmers.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    // Simple UI toggler for payment methods directly on the page for checkout only
    function togglePaymentFields() {
        const type = document.getElementById('paymentType').value;
        const upi = document.getElementById('upi-fields');
        const card = document.getElementById('card-fields');
        
        if (type === 'upi') {
            upi.classList.remove('hidden');
            card.classList.add('hidden');
        } else if (type === 'card') {
            card.classList.remove('hidden');
            upi.classList.add('hidden');
        } else {
            upi.classList.add('hidden');
            card.classList.add('hidden');
        }
    }
  </script>
</body>
</html>
